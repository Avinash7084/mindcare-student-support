{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-4xl mx-auto py-4 sm:py-6 animate-fade-in flex flex-col h-[calc(100vh-12rem)] min-h-[500px]">

    <div class="bg-white dark:bg-mind-darkCard rounded-3xl border border-slate-200 dark:border-slate-700/40 shadow-sm flex flex-col flex-grow overflow-hidden theme-transition">
        
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 flex items-center justify-center text-xl">
                    <i class="bi bi-robot"></i>
                </div>
                <div>
                    <h2 class="text-sm sm:text-base font-bold text-slate-900 dark:text-white">MindCare AI Copilot</h2>
                    <p class="text-[11px] text-emerald-500 font-medium flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> NLP Session Node Online
                    </p>
                </div>
            </div>
            
            <span class="text-[10px] bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-md text-slate-400 font-semibold uppercase tracking-wider hidden sm:inline">
                Asynchronous Pipeline
            </span>
        </div>

        <div id="chat-window" class="flex-grow overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-50/30 dark:bg-slate-900/10 custom-scrollbar">
            
            <div class="flex items-start gap-3 max-w-[85%]">
                <div class="w-7 h-7 rounded-lg bg-emerald-500 text-white flex items-center justify-center text-xs shrink-0 shadow-sm shadow-emerald-500/20">
                    AI
                </div>
                <div class="bg-white dark:bg-slate-800 text-sm p-3.5 rounded-2xl rounded-tl-none border border-slate-100 dark:border-slate-700/30 text-slate-800 dark:text-slate-200 shadow-sm leading-relaxed">
                    Hello! I'm your dedicated, secure digital support agent. How are you feeling today?
                </div>
            </div>

        </div>

        <div id="typing-indicator" class="px-6 py-2 bg-transparent hidden">
            <div class="flex items-center gap-2 max-w-[100px] bg-slate-100 dark:bg-slate-800 px-4 py-2.5 rounded-2xl rounded-tl-none">
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
            </div>
        </div>

        <div class="p-4 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-mind-darkCard">
            <div class="flex items-center gap-2 relative">
                <input type="text" 
                       id="userMsg" 
                       class="w-full bg-slate-50 dark:bg-slate-800/60 text-sm text-slate-800 dark:text-slate-100 pl-4 pr-12 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700/60 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all placeholder-slate-400" 
                       placeholder="Describe what's on your mind..." 
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                
                <button onclick="sendMessage()" 
                        class="absolute right-2 top-1.5 bottom-1.5 px-3 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white rounded-lg flex items-center justify-center shadow-sm shadow-emerald-600/10 transition-all cursor-pointer">
                    <i class="bi bi-send-fill text-xs"></i>
                </button>
            </div>
        </div>

    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
</style>

<script>
async function sendMessage() {
    const input = document.getElementById('userMsg');
    const chatWindow = document.getElementById('chat-window');
    const typingIndicator = document.getElementById('typing-indicator');
    const msg = input.value.trim();
    
    if (!msg) return;

    // 1. Inject User Message Bubble dynamically into view
    chatWindow.innerHTML += `
        <div class="flex items-start gap-3 justify-end max-w-[85%] ms-auto animate-fade-in">
            <div class="bg-blue-600 text-white text-sm p-3.5 rounded-2xl rounded-tr-none shadow-sm shadow-blue-600/10 leading-relaxed">
                ${msg}
            </div>
            <div class="w-7 h-7 rounded-lg bg-blue-500 text-white flex items-center justify-center text-[10px] font-bold shrink-0 shadow-sm shadow-blue-500/10">
                YOU
            </div>
        </div>
    `;
    
    // Clear user message slot buffer input and scroll context window low
    input.value = '';
    chatWindow.scrollTop = chatWindow.scrollHeight;

    // 2. Unhide Typing Loader Framework State Indicator
    typingIndicator.classList.remove('hidden');
    chatWindow.scrollTop = chatWindow.scrollHeight;

    try {
        const response = await fetch('/chatbot/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ message: msg })
        });
        
        const data = await response.json();
        
        // Hide loading animation state loop
        typingIndicator.classList.add('hidden');

        // 3. Append Inbound Chatbot Response Matrix Bubble
        chatWindow.innerHTML += `
            <div class="flex items-start gap-3 max-w-[85%] animate-fade-in">
                <div class="w-7 h-7 rounded-lg bg-emerald-500 text-white flex items-center justify-center text-xs shrink-0 shadow-sm shadow-emerald-500/20">
                    AI
                </div>
                <div class="bg-white dark:bg-slate-800 text-sm p-3.5 rounded-2xl rounded-tl-none border border-slate-100 dark:border-slate-700/30 text-slate-800 dark:text-slate-200 shadow-sm leading-relaxed">
                    ${data.response}
                </div>
            </div>
        `;
    } catch (error) {
        typingIndicator.classList.add('hidden');
        // Elegant operational error exception handler fallback representation
        chatWindow.innerHTML += `
            <div class="flex items-start gap-3 max-w-[85%]">
                <div class="w-7 h-7 rounded-lg bg-rose-500 text-white flex items-center justify-center text-xs shrink-0">
                    ERR
                </div>
                <div class="bg-rose-50 dark:bg-rose-950/20 text-sm p-3.5 rounded-2xl rounded-tl-none border border-rose-100 dark:border-rose-900/30 text-rose-600 dark:text-rose-400 shadow-sm">
                    Connection interrupted. Please verify server connectivity or routing channels.
                </div>
            </div>
        `;
    }

    // Recalculate scrolling depth coordinates
    chatWindow.scrollTop = chatWindow.scrollHeight;
}
</script>
{% endblock %}
