{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[85vh] items-center justify-center bg-slate-900 px-4 py-12">
    <div class="w-full max-w-md space-y-8 rounded-2xl bg-slate-800 p-8 shadow-xl border border-slate-700">
        
        <div class="text-center">
            <h2 class="text-3xl font-bold tracking-tight text-white">Create an account</h2>
            <p class="mt-2 text-sm text-slate-400">Please enter your details to register.</p>
        </div>

        <form class="mt-8 space-y-6" action="{% url 'register' %}" method="POST">
            {% csrf_token %} <div class="space-y-4 rounded-md shadow-sm">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1">USERNAME</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0-1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                            </svg>
                        </div>
                        <input id="username" name="username" type="text" required class="block w-full rounded-lg border border-slate-600 bg-slate-700 py-2.5 pl-10 pr-3 text-white placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-1">EMAIL ADDRESS</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                            </svg>
                        </div>
                        <input id="email" name="email" type="email" required class="block w-full rounded-lg border border-slate-600 bg-slate-700 py-2.5 pl-10 pr-3 text-white placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="Enter your email">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1">PASSWORD</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" required class="block w-full rounded-lg border border-slate-600 bg-slate-700 py-2.5 pl-10 pr-10 text-white placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 text-sm" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" class="group relative flex w-full justify-center rounded-lg bg-emerald-600 py-2.5 px-4 text-sm font-semibold text-white hover:bg-emerald-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600 transition-colors duration-200">
                    Sign Up
                </button>
            </div>

            <div class="text-center text-sm text-slate-400 mt-4">
                Already have an account? 
                <a href="/login" class="font-medium text-emerald-400 hover:text-emerald-300 transition-colors">Sign In</a>
            </div>
        </form>
    </div>
</div>
{% if messages %}
    <div class="space-y-2">
        {% for message in messages %}
            <div class="p-3 text-sm rounded-lg text-white bg-red-500/80 {% if message.tags == 'success' %}bg-emerald-500/80{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

{% endblock %}
